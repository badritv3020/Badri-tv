<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badri Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background:#000;
    color:white;
    scroll-behavior:smooth;
}

/* NAVBAR */
nav{
    position:fixed;
    width:100%;
    background:rgba(0,0,0,0.7);
    padding:15px;
    text-align:center;
    z-index:1000;
}

/* HERO */
.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}
.hero h1{
    font-size:50px;
    animation:fade 2s;
}

/* GALLERY */
.gallery{
    padding:80px 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}
.gallery img{
    width:100%;
    border-radius:15px;
    cursor:pointer;
    transition:0.4s;
}
.gallery img:hover{
    transform:scale(1.1);
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}
.lightbox img{
    width:90%;
    max-width:600px;
}

/* CONTACT */
.contact{
    padding:40px;
    text-align:center;
    background:#111;
}
.btn{
    display:inline-block;
    margin:10px;
    padding:12px 20px;
    border-radius:30px;
    text-decoration:none;
    color:white;
    background:#25D366;
}

/* FLOAT WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
}
.whatsapp img{width:60px;}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<nav>
<h2>Badri Photography</h2>
</nav>

<section class="hero">
<h1>Capture Your Moments</h1>
</section>

<section class="gallery">
<img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d" onclick="openImg(this.src)">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" onclick="openImg(this.src)">
<img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308" onclick="openImg(this.src)">
<img src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde" onclick="openImg(this.src)">
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
<img id="lightbox-img">
</div>

<section class="contact">
<h2>Contact Us</h2>

<p>📞 7017553020</p>
<p>📞 7409719741</p>

<a class="btn" href="tel:7017553020">📞 Call 1</a>
<a class="btn" href="tel:7409719741">📞 Call 2</a>

<br>

<a class="btn" href="https://wa.me/917017553020?text=Hello%20I%20want%20photography" target="_blank">💬 WhatsApp 1</a>
<a class="btn" href="https://wa.me/917409719741?text=Hello%20I%20want%20photography" target="_blank">💬 WhatsApp 2</a>

<h3 id="location">📍 Getting location...</h3>
<a id="mapLink" class="btn" target="_blank">📍 Open Map</a>

</section>

<!-- FLOAT WHATSAPP -->
<div class="whatsapp">
<a href="https://wa.me/917017553020" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>
</div>

<script>
function openImg(src){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=src;
}
function closeImg(){
    document.getElementById("lightbox").style.display="none";
}

navigator.geolocation.getCurrentPosition(function(pos){
    let lat=pos.coords.latitude;
    let lon=pos.coords.longitude;
    document.getElementById("location").innerHTML="📍 "+lat+", "+lon;
    document.getElementById("mapLink").href="https://maps.google.com?q="+lat+","+lon;
});
</script>

</body>
</html>
